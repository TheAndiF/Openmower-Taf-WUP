services:
  waha:
    image: devlikeapro/waha:arm
    container_name: waha
    restart: unless-stopped
    ports:
      - "${WAHA_EXTERNAL_PORT:-9629}:3000"
    environment:
      - TZ=Europe/Berlin
      - WAHA_DASHBOARD_ENABLED=${WAHA_DASHBOARD_ENABLED:-true}
      - WAHA_DASHBOARD_USERNAME=${WAHA_DASHBOARD_USERNAME:-waha}
      - WAHA_DASHBOARD_PASSWORD=${WAHA_DASHBOARD_PASSWORD}
      - WAHA_API_KEY=${WAHA_API_KEY}
      # WAHA sends incoming WhatsApp messages to the controller.
      # Important: do not use the container name "waha_mqtt_controller" here.
      # WAHA validates webhook URLs strictly and rejects hostnames with underscores.
      # The alias "waha-mqtt-controller" is provided by compose.override.yaml.
      - WHATSAPP_HOOK_URL=http://waha-mqtt-controller:8080/webhook
      - WHATSAPP_HOOK_EVENTS=message
      # Start the configured WAHA session automatically when the WAHA API starts.
      # Set WAHA_SESSION in .env, for example: WAHA_SESSION=Wasserleberweg
      - WHATSAPP_START_SESSION=${WAHA_SESSION:-}
    volumes:
      - ./waha_sessions:/app/.sessions
    networks:
      - openmower_default

  waha_mqtt_controller:
    image: ghcr.io/theandif/openmower-taf-wup:latest
    container_name: waha_mqtt_controller
    restart: unless-stopped
    environment:
      - MQTT_HOST=${MQTT_HOST:-Mosquitto}
      - MQTT_PORT=${MQTT_PORT:-1883}
      - MQTT_BASE_TOPIC=${MQTT_BASE_TOPIC:-messenger}
      - WAHA_URL=${WAHA_URL:-http://waha:3000}
      - WAHA_API_KEY=${WAHA_API_KEY}
      # Preferred WAHA session and automatic session self-healing.
      # The controller checks WAHA and calls /start or /restart when needed.
      - WAHA_SESSION=${WAHA_SESSION:-}
      - WAHA_AUTO_REPAIR_SESSION=${WAHA_AUTO_REPAIR_SESSION:-true}
      - WAHA_START_STOPPED_SESSION=${WAHA_START_STOPPED_SESSION:-true}
      - WAHA_STARTING_TIMEOUT_SECONDS=${WAHA_STARTING_TIMEOUT_SECONDS:-90}
      - WAHA_REPAIR_COOLDOWN_SECONDS=${WAHA_REPAIR_COOLDOWN_SECONDS:-300}
      - WAHA_MAX_RESTARTS_PER_HOUR=${WAHA_MAX_RESTARTS_PER_HOUR:-3}
      - WAHA_SEND_READY_WAIT_SECONDS=${WAHA_SEND_READY_WAIT_SECONDS:-30}
      - WAHA_WATCHDOG_SECONDS=${WAHA_WATCHDOG_SECONDS:-60}
      # WAHA QR raw value via MQTT while the session waits for WhatsApp pairing.
      # Active QR data is sensitive and is not retained by default.
      - WAHA_QR_MQTT_ENABLED=${WAHA_QR_MQTT_ENABLED:-true}
      - WAHA_QR_RAW_RETAIN=${WAHA_QR_RAW_RETAIN:-false}
      - WAHA_QR_REFRESH_SECONDS=${WAHA_QR_REFRESH_SECONDS:-20}
      # Non-secret hints published under messenger/status/description.
      # The password itself is never published to MQTT.
      - WAHA_EXTERNAL_PORT=${WAHA_EXTERNAL_PORT:-9629}
      - WAHA_DASHBOARD_URL=${WAHA_DASHBOARD_URL:-http://openmower.local:9629/dashboard}
      - WAHA_DASHBOARD_USERNAME=${WAHA_DASHBOARD_USERNAME:-waha}
      - CREDENTIALS_FILE_HINT=${CREDENTIALS_FILE_HINT:-/opt/stacks/whatsapp/.env}
      - CONTROLLER_REFRESH_SECONDS=${CONTROLLER_REFRESH_SECONDS:-60}
      - BOT_HTTP_PORT=${BOT_HTTP_PORT:-8080}
      - STATUS_TIMEZONE=${STATUS_TIMEZONE:-Europe/Berlin}
      - DATA_DIR=/data
      - MESSENGER_PROVIDER=${MESSENGER_PROVIDER:-waha}
      - MESSENGER_PROTOCOL=${MESSENGER_PROTOCOL:-whatsapp}
      - BOT_COMMANDS_FILE=${BOT_COMMANDS_FILE:-/data/bot_commands.xml}
      # Cache only text/JSON status topics. WiFi /bson is binary and must not be used.
      - OPENMOWER_STATUS_CACHE_TOPICS=${OPENMOWER_STATUS_CACHE_TOPICS:-robot_state/json,gps_state/json,gps/position/json,gps_position/json,area_queue/json,mow_area/json,mow_area/status/json,mowing_area/json,mowing/area_queue/json,sensors/om_system_wifi_signal_percent/data,openmower/robot_state/json,openmower/gps_state/json,openmower/gps/position/json,openmower/gps_position/json,openmower/area_queue/json,openmower/mow_area/json,openmower/mow_area/status/json,openmower/mowing_area/json,openmower/mowing/area_queue/json,openmower/sensors/om_system_wifi_signal_percent/data}
    volumes:
      - ./controller_data:/data
    depends_on:
      - waha
    networks:
      - openmower_default

networks:
  openmower_default:
    external: true
